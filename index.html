<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090d14" />
    <meta name="blueprint-base" content="/Blueprint" />
    <title>Blueprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var meta = document.querySelector('meta[name="blueprint-base"]');
        var metaBase = (meta && meta.getAttribute("content") || "").replace(/\/$/, "");
        var path = window.location.pathname.replace(/\/+$/, "") || "/";
        var base = metaBase;
        if (metaBase && path !== metaBase && path.indexOf(metaBase + "/") !== 0) {
          base = "";
        }
        window.__BLUEPRINT_BASE__ = base;

        var saved = sessionStorage.getItem("blueprint-spa-redirect");
        if (saved) {
          sessionStorage.removeItem("blueprint-spa-redirect");
          history.replaceState(null, "", saved);
        }

        function bp(path) {
          var normalized = path.charAt(0) === "/" ? path : "/" + path;
          return base ? base + normalized : normalized;
        }

        var cacheVersion = "20260603-8";
        var stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = bp("/styles.css?v=" + cacheVersion);
        document.head.appendChild(stylesheet);

        ["/js/vendor/p5.min.js", "/js/vendor/vanta.topology.min.js"].forEach(function (src) {
          var script = document.createElement("script");
          script.defer = true;
          script.src = bp(src);
          document.head.appendChild(script);
        });

        var app = document.createElement("script");
        app.type = "module";
        app.src = bp("/js/app.js?v=" + cacheVersion);
        document.head.appendChild(app);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
