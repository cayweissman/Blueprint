<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090d14" />
    <!-- Set to /your-repo-name when using GitHub project pages (user.github.io/repo). Leave empty for domain root. -->
    <meta name="blueprint-base" content="/Blueprint" />
    <title>Blueprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var meta = document.querySelector('meta[name="blueprint-base"]');
        var base = (meta && meta.getAttribute("content") || "").replace(/\/$/, "");
        var s = document.createElement("script");
        s.src = (base || "") + "/js/blueprint-head.js";
        s.dataset.cache = "20260602-106";
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
